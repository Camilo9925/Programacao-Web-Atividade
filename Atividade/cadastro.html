<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Atividade</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <h1>Criar Conta</h1>
            <p class="subtitle">Preencha os dados abaixo para se cadastrar</p>
            
            <form id="cadastroForm">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome">
                    <span class="error" id="erroNome"></span>
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com">
                    <span class="error" id="erroEmail"></span>
                </div>

                <div class="form-group">
                    <label for="telefone">Telefone</label>
                    <input type="text" id="telefone" name="telefone" placeholder="(00) 00000-0000">
                    <span class="error" id="erroTelefone"></span>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres">
                    <span class="error" id="erroSenha"></span>
                </div>

                <div class="form-group">
                    <label for="confirmarSenha">Confirmar Senha</label>
                    <input type="password" id="confirmarSenha" name="confirmarSenha" placeholder="Repita sua senha">
                    <span class="error" id="erroConfirmarSenha"></span>
                </div>

                <button type="submit" class="btn-submit">Cadastrar</button>
            </form>

            <div id="mensagemSucesso" class="success-message" style="display: none;">
                ✓ Cadastro realizado com sucesso!
            </div>

            <p class="link-login">Já tem conta? <a href="login.html">Faça login aqui</a></p>
        </div>
    </div>

    <script src="cadastro.js"></script>
</body>
</html>
