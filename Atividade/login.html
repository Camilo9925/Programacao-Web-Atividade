<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Atividade</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <h1>Fazer Login</h1>
            <p class="subtitle">Entre com suas credenciais</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="emailLogin">E-mail</label>
                    <input type="email" id="emailLogin" name="email" placeholder="seu@email.com">
                    <span class="error" id="erroEmailLogin"></span>
                </div>

                <div class="form-group">
                    <label for="senhaLogin">Senha</label>
                    <input type="password" id="senhaLogin" name="senha" placeholder="Sua senha">
                    <span class="error" id="erroSenhaLogin"></span>
                </div>

                <button type="submit" class="btn-submit">Entrar</button>
            </form>

            <div id="mensagemErro" class="error-message" style="display: none;">
                ✗ E-mail ou senha incorretos
            </div>

            <div id="mensagemSucessoLogin" class="success-message" style="display: none;">
                ✓ Login realizado com sucesso!
            </div>

            <p class="link-login">Não tem conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
