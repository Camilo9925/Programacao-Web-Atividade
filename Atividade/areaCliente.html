<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Cliente - Atividade</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="dashboard-wrapper">
            <div class="dashboard-header">
                <h1>Bem-vindo!</h1>
                <button id="btnSair" class="btn-logout">Sair</button>
            </div>

            <div class="dashboard-content">
                <p>Olá, <strong id="nomeUsuario"></strong>!</p>
                <p>E-mail: <strong id="emailUsuario"></strong></p>
                <p>Telefone: <strong id="telefoneUsuario"></strong></p>
                <p class="dashboard-message">Você foi autenticado com sucesso e pode acessar sua área exclusiva.</p>
            </div>
        </div>
    </div>

    <script src="areaCliente.js"></script>
</body>
</html>
